<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DB Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0f14;
    --surface:  #151820;
    --panel:    #1b1f2a;
    --border:   #252a38;
    --accent:   #4f8ef7;
    --accent2:  #7c5cfc;
    --green:    #2dcc8f;
    --amber:    #f5a623;
    --red:      #f05a5a;
    --text:     #e2e6f0;
    --muted:    #687080;
    --code-bg:  #111318;
    --radius:   12px;
    --mono:     'DM Mono', monospace;
    --sans:     'Sora', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600; color: #fff;
    font-family: var(--mono);
  }
  header h1 { font-size: 15px; font-weight: 500; letter-spacing: 0.02em; }
  header p  { font-size: 12px; color: var(--muted); font-family: var(--mono); margin-top: 1px; }

  #status-dot {
    margin-left: auto;
    display: flex; align-items: center; gap: 7px;
    font-size: 12px; font-family: var(--mono); color: var(--muted);
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .dot.ok     { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.error  { background: var(--red);   box-shadow: 0 0 6px var(--red);   }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── Sidebar ── */
  aside {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  aside h2 {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 16px 16px 8px;
  }
  #table-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  #table-list::-webkit-scrollbar { width: 4px; }
  #table-list::-webkit-scrollbar-track { background: transparent; }
  #table-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .table-item {
    padding: 7px 10px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .table-item:hover { background: var(--panel); color: var(--text); }
  .table-item::before {
    content: '⬡';
    font-size: 10px;
    color: var(--accent);
    opacity: 0.6;
  }

  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    line-height: 1.7;
  }
  .sidebar-footer span { color: var(--accent); }

  /* ── Chat area ── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Welcome */
  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 14px;
    opacity: 0.5;
    user-select: none;
    padding: 40px;
    text-align: center;
  }
  .welcome-icon { font-size: 40px; }
  .welcome h3   { font-size: 15px; font-weight: 500; }
  .welcome p    { font-size: 13px; color: var(--muted); font-family: var(--mono); }

  /* Chips */
  .chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 0 24px 8px;
  }
  .chip {
    padding: 6px 12px;
    font-size: 12px;
    font-family: var(--mono);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Message bubble */
  .msg {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.2s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.user  { flex-direction: row-reverse; }
  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg.user  .avatar { background: var(--accent2); }
  .msg.bot   .avatar { background: var(--panel); border: 1px solid var(--border); }

  .bubble {
    max-width: 72%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.7;
  }
  .msg.user .bubble {
    background: var(--accent2);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.bot .bubble {
    background: var(--panel);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  /* SQL block inside bot bubble */
  .sql-block {
    margin-top: 12px;
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .sql-header {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 0.08em;
  }
  .sql-header span { color: var(--green); }
  .sql-code {
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    color: #a8d8b0;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Typing indicator */
  .typing .bubble {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 14px 16px;
  }
  .typing .dot-anim {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.2s infinite;
  }
  .typing .dot-anim:nth-child(2) { animation-delay: 0.2s; }
  .typing .dot-anim:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0);  opacity: 0.4; }
    30%            { transform: translateY(-5px); opacity: 1;   }
  }

  /* Error bubble */
  .error-bubble {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--red);
    margin-top: 8px;
    padding: 8px 12px;
    background: rgba(240,90,90,0.07);
    border-radius: 6px;
    border: 1px solid rgba(240,90,90,0.2);
  }

  /* ── Input bar ── */
  .input-bar {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  #input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    resize: none;
    min-height: 46px;
    max-height: 140px;
    outline: none;
    transition: border-color 0.2s;
  }
  #input::placeholder { color: var(--muted); }
  #input:focus { border-color: var(--accent); }

  #send-btn {
    width: 46px; height: 46px;
    border-radius: 10px;
    background: var(--accent);
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  #send-btn:hover   { background: #3a7de8; }
  #send-btn:active  { transform: scale(0.95); }
  #send-btn:disabled { background: var(--border); cursor: not-allowed; }

  table th { padding:7px 12px; text-align:left; color:var(--muted); font-weight:500; letter-spacing:.04em; border-bottom:1px solid var(--border); }
  table td { padding:6px 12px; border-bottom:1px solid rgba(37,42,56,.5); color:var(--text); white-space:nowrap; max-width:200px; overflow:hidden; text-overflow:ellipsis; }
  table tr:last-child td { border-bottom:none; }
  table tr:hover td { background:rgba(79,142,247,.04); }

</style>
</head>
<body>

<header>
  <div class="logo">db</div>
  <div>
    <h1>Database Chatbot</h1>
    <p>sqlcoder:7b · PostgreSQL</p>
  </div>
  <div id="status-dot">
    <div class="dot" id="dot"></div>
    <span id="status-text">connecting…</span>
  </div>
</header>

<div class="layout">
  <aside>
    <h2>Tables</h2>
    <div id="table-list">
      <div class="table-item" style="opacity:0.4;cursor:default">loading…</div>
    </div>
    <div class="sidebar-footer">
      model: <span>sqlcoder:7b</span><br/>
      backend: <span>:8000</span>
    </div>
  </aside>

  <div class="chat-area">
    <div id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🗄️</div>
        <h3>Ask anything about your data</h3>
        <p>Multi-table queries, filters, aggregations — just ask in plain English.</p>
      </div>
    </div>

    <div class="chips" id="chips">
      <div class="chip" onclick="sendChip(this)">How many rows in each table?</div>
      <div class="chip" onclick="sendChip(this)">Show me the top 5 records</div>
      <div class="chip" onclick="sendChip(this)">List all table names</div>
    </div>

    <div class="input-bar">
      <textarea id="input" placeholder="Ask a question about your database…" rows="1"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send">➤</button>
    </div>
  </div>
</div>

<script>
const API = "http://localhost:8000";
let busy = false;

// ── Auto-resize textarea ──
const input = document.getElementById("input");
input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 140) + "px";
});
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── Health check + load tables ──
async function init() {
  try {
    const r = await fetch(`${API}/health`);
    const d = await r.json();
    const dot = document.getElementById("dot");
    const txt = document.getElementById("status-text");
    if (d.status === "ok") {
      dot.className = "dot ok";
      txt.textContent = "connected";
      loadTables(d.tables);
    } else {
      dot.className = "dot error";
      txt.textContent = "db error";
    }
  } catch {
    document.getElementById("dot").className = "dot error";
    document.getElementById("status-text").textContent = "backend offline";
  }
}

function loadTables(tables) {
  const el = document.getElementById("table-list");
  if (!tables || tables.length === 0) {
    el.innerHTML = '<div class="table-item" style="opacity:0.4;cursor:default">no tables found</div>';
    return;
  }
  el.innerHTML = tables.map(t =>
    `<div class="table-item" onclick="askAboutTable('${t}')">${t}</div>`
  ).join("");
}

function askAboutTable(name) {
  document.getElementById("input").value = `Show me the first 5 rows from ${name}`;
  document.getElementById("input").focus();
}

function sendChip(el) {
  document.getElementById("input").value = el.textContent;
  sendMessage();
}

// ── Render a message ──
function addMessage(role, text, sql, errMsg) {
  const welcome = document.getElementById("welcome");
  if (welcome) welcome.remove();

  const msgs = document.getElementById("messages");
  const div  = document.createElement("div");
  div.className = `msg ${role}`;

  const avatar = role === "user" ? "👤" : "🤖";
  const sqlBlock = (sql && role === "bot") ? `
    <div class="sql-block">
      <div class="sql-header">⬡ <span>SQL</span> · generated query</div>
      <div class="sql-code">${escHtml(sql)}</div>
    </div>` : "";

  const errBlock = errMsg ? `<div class="error-bubble">⚠ ${escHtml(errMsg)}</div>` : "";

  div.innerHTML = `
    <div class="avatar">${avatar}</div>
    <div class="bubble">${escHtml(text)}${sqlBlock}${errBlock}</div>`;

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function addTyping() {
  const msgs = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "msg bot typing";
  div.id = "typing";
  div.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="bubble">
      <div class="dot-anim"></div>
      <div class="dot-anim"></div>
      <div class="dot-anim"></div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  document.getElementById("typing")?.remove();
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function addTableResult(sql, cols, rows, count) {
  const welcome = document.getElementById("welcome");
  if (welcome) welcome.remove();

  const msgs = document.getElementById("messages");
  const div  = document.createElement("div");
  div.className = "msg bot";

  const headers = cols.map(c => `<th>${escHtml(c)}</th>`).join("");
  const body    = rows.map(row =>
    `<tr>${row.map(v => `<td>${escHtml(v == null ? "NULL" : String(v))}</td>`).join("")}</tr>`
  ).join("");

  div.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="bubble" style="max-width:90%">
      <div class="sql-block">
        <div class="sql-header">⬡ <span>SQL</span></div>
        <div class="sql-code">${escHtml(sql)}</div>
      </div>
      <div style="margin-top:10px;overflow-x:auto;border:1px solid var(--border);border-radius:8px">
        <table style="width:100%;border-collapse:collapse;font-size:12px;font-family:var(--mono)">
          <thead>
            <tr style="background:var(--code-bg)">${headers}</tr>
          </thead>
          <tbody>${body}</tbody>
        </table>
      </div>
      <div style="margin-top:6px;font-size:11px;font-family:var(--mono);color:var(--muted)">${count} row(s) returned</div>
    </div>`;

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── Send message ──
async function sendMessage() {
  if (busy) return;
  const msg = input.value.trim();
  if (!msg) return;

  input.value = "";
  input.style.height = "auto";
  busy = true;
  document.getElementById("send-btn").disabled = true;

  addMessage("user", msg);
  addTyping();

  try {
    const r = await fetch(`${API}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg }),
    });

    const reader = r.body.getReader();
    const dec = new TextDecoder();
    let buf = "";
    let sql = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        try {
          const ev = JSON.parse(line.slice(6));
          if (ev.type === "sql") {
            sql = ev.text;
          } else if (ev.type === "result") {
            removeTyping();
            if (ev.rows.length === 0) {
              addMessage("bot", "Query returned no results.", sql, null);
            } else {
              addTableResult(sql, ev.columns, ev.rows, ev.count);
            }
          } else if (ev.type === "error") {
            removeTyping();
            addMessage("bot", "Query failed.", sql, ev.text);
          }
        } catch {}
      }
    }
  } catch (e) {
    removeTyping();
    addMessage("bot", "Could not reach the backend. Is it running on port 8000?", null, e.message);
  } finally {
    busy = false;
    document.getElementById("send-btn").disabled = false;
    input.focus();
  }
}

init();
</script>
</body>
</html>
